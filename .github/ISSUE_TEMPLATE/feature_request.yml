name: Feature Request
description: Suggest an improvement to the audit skill
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - Scoring rubric (add/modify layers or criteria)
        - Voice analysis (how brand voice is inferred)
        - Rewrite rules (how content gets fixed)
        - Report format (how results are displayed)
        - Flow (how the audit progresses)
        - CTA / booking experience
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What would you like to change?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why does this improve the audit?
      description: How does this help the end user?
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example (optional)
      description: If proposing a scoring change, show a before/after of how scoring would differ
